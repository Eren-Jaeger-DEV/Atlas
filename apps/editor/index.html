<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Atlas Studio — Your codebase. Fully mapped. A professional, architecture-aware IDE." />
    <title>Atlas Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body, #root { height: 100%; width: 100%; overflow: hidden; }
      body {
        background: #000000;
        color: #cdd6f4;
        font-family: 'Inter', system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
        user-select: none;
      }
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #38bdf830; border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: #38bdf880; }
      
      .breakpoint-glyph {
        background-color: #ef4444;
        border-radius: 50%;
        width: 10px !important;
        height: 10px !important;
        margin: 4px 0 0 6px !important;
      }
      .debug-active-glyph {
        background-color: #fbbf24;
        clip-path: polygon(0 0, 100% 50%, 0 100%);
        width: 10px !important;
        height: 12px !important;
        margin: 3px 0 0 4px !important;
      }
      .debug-active-line {
        background-color: rgba(251, 191, 36, 0.15) !important;
      }

      /* Git Diff Gutters */
      .git-gutter-add {
        border-left: 3px solid #10b981; /* emerald-500 */
        margin-left: 5px;
      }
      .git-gutter-mod {
        border-left: 3px solid #3b82f6; /* blue-500 */
        margin-left: 5px;
      }
      .git-gutter-del {
        border-left: 3px solid #ef4444; /* red-500 */
        margin-left: 5px;
      }

      /* Git Blame Ghost Text */
      .git-blame-ghost {
        color: #71717a !important;
        font-size: 12px;
        font-style: italic;
        padding-left: 16px;
        pointer-events: none;
      }

      /* Global Hover States for Custom UI */
      button { outline: none; }
      button:not(:disabled):hover { filter: brightness(1.2); }
      .menu-btn:hover { background-color: #27272a !important; color: #38bdf8 !important; }
      .drop-item:hover:not(:disabled) { background-color: #38bdf820 !important; color: #38bdf8 !important; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
